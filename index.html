    body {

      color: #212529;

    .navbar {
      position: sticky; top: 4px; z-index: 100;
      background: #fff;
      border-bottom: 1px solid #E9ECEF;
      box-shadow: 0 1px 8px rgba(0,0,0,0.05);
      height: 64px;
      display: flex; align-items: center;
      padding: 0 32px;
      justify-content: space-between;
    }
    .navbar-brand {
      display: flex; align-items: center; gap: 12px;
    }
    .navbar-logo {
      height: 36px; width: auto;
    }
    .navbar-title {
      font-size: 0.78rem; font-weight: 700;
      color: #005B9A; letter-spacing: 0.04em;
      text-transform: uppercase;
    }
    .navbar-divider {
      width: 1px; height: 28px;
      background: #E9ECEF; margin: 0 4px;
    }

    /* ── Language toggle ── */
    .lang-wrap { display: flex; gap: 4px; }
    .lang-btn {
      padding: 4px 12px; border-radius: 4px;
      border: 1.5px solid #E9ECEF; background: #fff;
      cursor: pointer; font-weight: 700; font-size: 0.75rem;
      color: #6C757D; transition: all 0.15s;
      font-family: inherit;
    }
    .lang-btn.active { background: #E87722; color: #fff; border-color: #E87722; }
    .lang-btn:hover:not(.active) { border-color: #005B9A; color: #005B9A; }

    .hero {

      position: relative;
      overflow: hidden;
      padding: 80px 32px 64px;
      display: flex; align-items: center; justify-content: center;
    }
    .hero-geo-1 {
      position: absolute; top: -60px; right: -80px;
      width: 380px; height: 380px; border-radius: 50%;
      background: rgba(232,119,34,0.14);
      animation: floatA 12s ease-in-out infinite;
      pointer-events: none;
    }
    .hero-geo-2 {
      position: absolute; bottom: -40px; left: -40px;
      width: 220px; height: 220px;
      background: rgba(255,255,255,0.06);
      transform: rotate(30deg);
      animation: floatB 16s ease-in-out infinite;
      pointer-events: none;
    }
    @keyframes floatA { 0%,100% { transform: translate(0,0); } 50% { transform: translate(-20px,20px); } }
    @keyframes floatB { 0%,100% { transform: rotate(30deg) translate(0,0); } 50% { transform: rotate(35deg) translate(10px,-10px); } }

    .hero-content { position: relative; z-index: 2; max-width: 900px; text-align: center; }
    .hero-eyebrow {
      font-size: 0.72rem; font-weight: 700; letter-spacing: 0.18em;
      text-transform: uppercase; color: rgba(255,255,255,0.6);
      margin-bottom: 16px;
    }
    .hero-kurs-tag {
      display: inline-block;
      border: 1.5px solid rgba(255,255,255,0.4);
      color: rgba(255,255,255,0.82);
      padding: 4px 14px;
      font-size: 0.72rem; font-weight: 700;
      letter-spacing: 0.12em; text-transform: uppercase;
      margin-bottom: 24px;
    }
    .hero-title {
      font-size: clamp(2.8rem, 7vw, 6rem);
      font-weight: 800; color: #fff;
      line-height: 1.0; margin-bottom: 16px;
    }
    .hero-title span { color: #E87722; }
    .hero-subtitle {
      font-size: clamp(1.1rem, 2.5vw, 1.5rem);
      color: rgba(255,255,255,0.75);
      font-weight: 400; margin-bottom: 32px;
      line-height: 1.5;
    }
    .hero-badges {
      display: flex; flex-wrap: wrap; gap: 8px;
      justify-content: center; margin-bottom: 40px;
    }
    .hero-badge {
      border: 1.5px solid rgba(255,255,255,0.35);
      color: rgba(255,255,255,0.72);
      padding: 4px 12px; font-size: 0.72rem; font-weight: 600;
    }
    .hero-cta-row { display: flex; gap: 12px; justify-content: center; flex-wrap: wrap; }
    .btn-primary {
      background: #E87722; color: #fff;
      padding: 12px 28px; font-weight: 700; font-size: 0.9rem;
      border: 2px solid #E87722; cursor: pointer;
      text-decoration: none; display: inline-block;
      transition: background 0.15s, transform 0.15s;
      font-family: inherit;
    }
    .btn-primary:hover { background: #d06a1a; border-color: #d06a1a; transform: translateY(-1px); }
    .btn-outline {
      background: transparent; color: #fff;
      padding: 12px 28px; font-weight: 700; font-size: 0.9rem;
      border: 2px solid rgba(255,255,255,0.5); cursor: pointer;
      text-decoration: none; display: inline-block;
      transition: border-color 0.15s;
      font-family: inherit;
    }
    .btn-outline:hover { border-color: #fff; }

    /* ── Stats bar ── */
    .stats-bar {
      background: #fff;
      box-shadow: 0 4px 20px rgba(0,0,0,0.05);
      border-bottom: 1px solid #E9ECEF;
    }
    .stats-inner {
      max-width: 960px; margin: 0 auto;
      display: flex; flex-wrap: wrap;
    }
    .stat-item {
      flex: 1; min-width: 140px;
      text-align: center; padding: 28px 24px;
      position: relative;
    }
    .stat-item + .stat-item::before {
      content: '';
      position: absolute; left: 0; top: 25%; height: 50%;
      width: 1px; background: rgba(0,91,154,0.1);
    }
    .stat-num { font-size: 2.5rem; font-weight: 900; color: #E87722; line-height: 1; }
    .stat-lbl {
      font-size: 0.68rem; font-weight: 700;
      text-transform: uppercase; letter-spacing: 0.1em;
      color: #005B9A; margin-top: 6px;
    }

    /* ── Section layout ── */
    .section { padding: 72px 32px; }
    .section-inner { max-width: 960px; margin: 0 auto; }
    .section-eyebrow {
      font-size: 0.68rem; font-weight: 700;
      text-transform: uppercase; letter-spacing: 0.14em;
      color: #E87722; margin-bottom: 8px;
    }
    .section-title {
      font-size: clamp(1.6rem, 3vw, 2.2rem);
      font-weight: 800; color: #005B9A;
      line-height: 1.2; margin-bottom: 16px;
    }
    .section-lead {
      font-size: 1rem; color: #6C757D;
      line-height: 1.7; max-width: 680px;
    }
    .divider-line {
      width: 48px; height: 4px;
      background: #E87722; margin: 12px 0 24px;
    }

    /* ── Deming quote ── */
    .deming-section {
      background: #F1F3F5;
      border-left: 4px solid #E87722;
      padding: 40px 48px;
    }
    .deming-quote {
      font-size: clamp(1.3rem, 3vw, 2rem);
      font-weight: 700; color: #212529;
      line-height: 1.4; margin-bottom: 12px;
      font-style: italic;
    }
    .deming-source {
      font-size: 0.78rem; font-weight: 700;
      text-transform: uppercase; letter-spacing: 0.1em;
      color: #E87722;
    }

    /* ── Lab cards grid ── */
    .labs-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
      gap: 24px;
      margin-top: 48px;
    }
    .lab-card {
      background: #fff;
      border: 1.5px solid #E9ECEF;
      border-top: 3px solid #005B9A;
      padding: 28px;
      position: relative;
      transition: transform 0.25s ease, box-shadow 0.25s ease, border-top-color 0.25s ease;
      display: flex; flex-direction: column;
      min-height: 260px;
      cursor: pointer;
      text-decoration: none; color: inherit;
    }
    .lab-card:hover {
      transform: translateY(-4px);
      box-shadow: 0 16px 32px rgba(232,119,34,0.12);
      border-top-color: #E87722;
      border-color: rgba(232,119,34,0.3);
    }
    .lab-card-num {
      position: absolute; top: 16px; right: 20px;
      font-size: 2.8rem; font-weight: 900;
      color: rgba(0,91,154,0.07); line-height: 1;
      pointer-events: none; user-select: none;
      font-variant-numeric: tabular-nums;
    }
    .lab-icon {
      width: 40px; height: 40px;
      background: #005B9A; border-radius: 6px;
      display: flex; align-items: center; justify-content: center;
      margin-bottom: 16px; flex-shrink: 0;
    }
    .lab-icon svg { color: #fff; }
    .lab-kw {
      font-size: 0.68rem; font-weight: 700;
      text-transform: uppercase; letter-spacing: 0.1em;
      color: #6C757D; margin-bottom: 4px;
    }
    .lab-title {
      font-size: 1rem; font-weight: 800;
      color: #005B9A; line-height: 1.25;
      margin-bottom: 8px;
    }
    .lab-desc {
      font-size: 0.84rem; color: #6C757D;
      line-height: 1.65; flex: 1; margin-bottom: 16px;
    }
    .lab-footer {
      display: flex; align-items: center;
      justify-content: space-between; margin-top: auto;
    }
    .diff-badge {
      font-size: 0.68rem; font-weight: 700;
      padding: 3px 10px; letter-spacing: 0.04em;

    .diff-mittel    { background: #fef3c7; color: #92400e; }
    .diff-fortgesch { background: #fee2e2; color: #991b1b; }
    .lab-cta { font-size: 0.82rem; font-weight: 700; color: #E87722; }

    .workflow-row {
      display: flex; align-items: center;
      gap: 0; flex-wrap: nowrap; overflow-x: auto;
      padding-bottom: 4px; margin-top: 32px;
    }
    .wf-box {
      background: #fff;
      border: 1.5px solid rgba(0,91,154,0.25);
      padding: 14px 20px;
      font-weight: 700; font-size: 0.85rem;
      color: #005B9A; white-space: nowrap;
      flex: 1; text-align: center; min-width: 110px;
    }
    .wf-arrow {
      color: #E87722; font-size: 1.4rem; font-weight: 900;
      flex-shrink: 0; padding: 0 8px;
      animation: arrowPulse 2.5s ease-in-out infinite;
    }

      0%,100% { opacity:1; transform:translateX(0); }

    }

    .instructor-card {
      background: #fff;
      border: 1.5px solid #E9ECEF;
      border-radius: 12px;
      overflow: hidden;
      max-width: 480px;
      box-shadow: 0 4px 24px rgba(0,0,0,0.07);

    .instructor-cover {

      background: linear-gradient(135deg, #005B9A 0%, #003d6b 100%);
      position: relative;
    }
    .instructor-cover::after {
      content: '';
      position: absolute; bottom: 0; left: 0; right: 0; top: 0;
      background-image: repeating-linear-gradient(

    .instructor-avatar-wrap {
      padding: 0 24px;
      margin-top: -36px;
      position: relative; z-index: 2;
    }
    .instructor-avatar {
      width: 80px; height: 80px; border-radius: 50%;
      border: 3px solid #fff;
      background: #E9ECEF;
      object-fit: cover;
      display: block;
      box-shadow: 0 2px 8px rgba(0,0,0,0.15);
    }
    .instructor-avatar-placeholder {
      width: 80px; height: 80px; border-radius: 50%;
      border: 3px solid #fff;
      background: #005B9A;
      display: flex; align-items: center; justify-content: center;
      box-shadow: 0 2px 8px rgba(0,0,0,0.15);
      font-size: 2rem; color: #fff; font-weight: 800;
    }
    .instructor-body { padding: 12px 24px 24px; }
    .instructor-name { font-size: 1.1rem; font-weight: 800; color: #212529; }
    .instructor-title { font-size: 0.84rem; color: #6C757D; margin-top: 2px; line-height: 1.5; }
    .instructor-org {
      display: flex; align-items: center; gap: 8px;
      margin-top: 12px; font-size: 0.8rem; color: #005B9A; font-weight: 600;
    }
    .instructor-tags {
      display: flex; flex-wrap: wrap; gap: 6px; margin-top: 12px;
    }
    .instructor-tag {
      background: rgba(0,91,154,0.08);
      color: #005B9A; font-size: 0.72rem; font-weight: 700;
      padding: 3px 10px; border-radius: 20px;
    }
    .instructor-contact {
      margin-top: 16px; font-size: 0.78rem; color: #6C757D;
      display: flex; align-items: center; gap: 6px;
    }

    /* ── AI Section ── */
    .ai-card {
      background: #F1F3F5;
      border-left: 3px solid #E87722;
      padding: 24px 28px;
      margin-bottom: 16px;
    }
    .ai-card-title { font-size: 0.9rem; font-weight: 800; color: #212529; margin-bottom: 8px; }
    .ai-card-body { font-size: 0.84rem; color: #6C757D; line-height: 1.65; }
    .code-block {
      background: #0f172a;
      border-left: 3px solid #E87722;
      color: #e2e8f0;
      font-family: 'Consolas', 'Monaco', 'Courier New', monospace;
      font-size: 0.78rem; line-height: 1.7;
      padding: 16px 20px;
      overflow-x: auto;
    }
    .code-comment { color: #64748b; }
    .code-key { color: #93c5fd; }
    .code-str { color: #86efac; }

    /* ── Footer ── */
    .footer {
      background: #212529;
      padding: 48px 32px;
      text-align: center;

    .footer-inner { max-width: 960px; margin: 0 auto; }
    .footer-title { font-size: 0.78rem; font-weight: 700; color: rgba(255,255,255,0.4);
      text-transform: uppercase; letter-spacing: 0.12em; margin-bottom: 8px; }
    .footer-text { font-size: 0.84rem; color: rgba(255,255,255,0.55); line-height: 1.7; }
    .footer-link { color: #E87722; text-decoration: none; }
    .footer-link:hover { text-decoration: underline; }

    /* ── Scroll reveal ── */
    .sr {
      opacity: 0; transform: translateY(16px);
      transition: opacity 0.55s ease, transform 0.55s ease;
    }
    .sr.visible { opacity: 1; transform: translateY(0); }

    /* ── BG alternating ── */
    .bg-alt { background: #F1F3F5; }

    /* ── Responsive ── */
    @media (max-width: 640px) {
      .hero { padding: 64px 20px 48px; }
      .section { padding: 48px 20px; }
      .navbar { padding: 0 20px; }
      .deming-section { padding: 32px 24px; }
      .labs-grid { grid-template-columns: 1fr; }
    }
  </style>
</head>

/* ── Scroll Reveal Hook ── */
function useScrollReveal() {
  useEffect(() => {
    const els = document.querySelectorAll('.sr');
    const obs = new IntersectionObserver((entries) => {
      entries.forEach(e => { if (e.isIntersecting) { e.target.classList.add('visible'); } });
    }, { threshold: 0.1 });
    els.forEach(el => obs.observe(el));
    return () => obs.disconnect();
  }, []);
}

      {/* Hero */}
      <section className="hero">
        <div className="hero-geo-1"/>
        <div className="hero-geo-2"/>
        <div className="hero-content">
          <p className="hero-eyebrow">{t.heroEyebrow}</p>
          <div className="hero-kurs-tag">{t.heroKursTag}</div>
          <h1 className="hero-title">
            {t.heroTitle[0]}
            <span>{t.heroTitle[1]}</span>
            {t.heroTitle[2]}
          </h1>
          <p className="hero-subtitle">{t.heroSub}</p>
          <div className="hero-badges">
            {t.heroBadges.map((b,i) => <span key={i} className="hero-badge">{b}</span>)}
            <a href="urbancart.html" className="hero-badge" style={{textDecoration:'none', cursor:'pointer', borderColor:'rgba(232,119,34,0.7)', color:'#E87722'}}>
              {lang==='de'?'↗ UrbanCart Webshop':'↗ UrbanCart Shop'}
            </a>
          </div>
          <div className="hero-cta-row">
            <a href="#labs" className="btn-primary">{t.heroCta1}</a>
            <a href="#kurs" className="btn-outline">{t.heroCta2}</a>
          </div>
        </div>
      </section>

      {/* Stats */}
      <div className="stats-bar">
        <div className="stats-inner">
          {[
            [t.stat1num, t.stat1lbl],
            [t.stat2num, t.stat2lbl],
            [t.stat3num, t.stat3lbl],
            [t.stat4num, t.stat4lbl],
          ].map(([n,l],i) => (
            <div key={i} className="stat-item">
              <div className="stat-num">{n}</div>
              <div className="stat-lbl">{l}</div>
            </div>
          ))}
        </div>
      </div>

      {/* Deming Quote */}
      <section className="section" id="kurs">
        <div className="section-inner">
          <div className="deming-section sr">
            <p className="deming-quote">{t.demingQuote}</p>
            <p className="deming-source">{t.demingSource}</p>
          </div>
        </div>
      </section>

      {/* Labs */}
      <section className="section bg-alt" id="labs">
        <div className="section-inner">
          <p className="section-eyebrow sr">{t.labsEyebrow}</p>
          <h2 className="section-title sr">{t.labsTitle}</h2>
          <div className="divider-line sr"/>
          <p className="section-lead sr">{t.labsLead}</p>

          {/* Workflow */}
          <div className="sr" style={{marginTop:'40px'}}>
            <p style={{fontSize:'0.72rem',fontWeight:700,textTransform:'uppercase',letterSpacing:'0.1em',color:'#6C757D',marginBottom:'16px'}}>{t.wfTitle}</p>
            <div className="workflow-row">
              {t.wfSteps.map((s,i) => (
                <React.Fragment key={i}>
                  <div className="wf-box">{s}</div>
                  {i < t.wfSteps.length - 1 && <div className="wf-arrow">›</div>}
                </React.Fragment>
              ))}
            </div>
          </div>

          {/* Lab Cards */}
          <div className="labs-grid">
            {LABS.map((lab, idx) => {
              const d = lang === 'de' ? lab.de : lab.en;
              return (
                <a href={`lab0${lab.id}.html`} key={lab.id} className="lab-card sr" style={{transitionDelay: `${(idx % 3) * 80}ms`, textDecoration:'none'}}>
                  <div className="lab-card-num">0{lab.id}</div>
                  <div className="lab-icon">{lab.icon}</div>
                  <div className="lab-kw">{d.kw}</div>
                  <div className="lab-title">{d.title}</div>
                  <div className="lab-desc">{d.desc}</div>
                  <div className="lab-footer">
                    <span className={`diff-badge ${diffClass(lab.diff)}`}>{d.diff}</span>
                    <span className="lab-cta">{t.startLab}</span>
                  </div>
                </a>
              );
            })}
          </div>
        </div>
      </section>

      {/* Instructor */}
      <section className="section" id="dozentin">
        <div className="section-inner">
          <p className="section-eyebrow sr">{t.instructorEyebrow}</p>
          <h2 className="section-title sr">{t.instructorTitle} {t.instructorName}</h2>
          <div className="divider-line sr"/>

          <div className="sr" style={{display:'flex', gap:'48px', flexWrap:'wrap', alignItems:'flex-start', marginTop:'8px'}}>
            {/* LinkedIn Card */}
            <div className="instructor-card">
              <div className="instructor-cover"/>
              <div className="instructor-avatar-wrap">
                <img src="assets/eva-klenk.jpg" alt="Prof. Dr.-Ing. Eva Klenk" className="instructor-avatar"/>
              </div>
              <div className="instructor-body">
                <div className="instructor-name">{t.instructorTitle} {t.instructorName}</div>
                <div className="instructor-title">{t.instructorSub}</div>
                <div className="instructor-org">
                  <IconBuilding/>
                  {t.instructorOrg}
                </div>
                <div className="instructor-tags">
                  {t.instructorTags.map((tag,i) => <span key={i} className="instructor-tag">{tag}</span>)}
                </div>
                <div className="instructor-contact">
                  <IconMail/>
                  <a href={`mailto:${t.instructorContact}`} style={{color:'#005B9A', textDecoration:'none'}}>{t.instructorContact}</a>
                </div>
              </div>
            </div>

            {/* Bio text */}
            <div style={{flex:1, minWidth:'260px'}}>
              <p style={{fontSize:'1rem', lineHeight:'1.75', color:'#6C757D', marginBottom:'16px'}}>
                {lang === 'de'
                  ? 'Prof. Dr.-Ing. Eva Klenk lehrt an der THWS Business School Würzburg im Schwerpunkt Wirtschaftsinformatik und Digital Business. Ihre Lehrgebiete umfassen ERP-Systeme, Process Mining und Robotische Prozessautomatisierung (RPA).'
                  : 'Prof. Dr.-Ing. Eva Klenk teaches at THWS Business School Würzburg in the field of Business Informatics and Digital Business. Her teaching areas include ERP systems, process mining and robotic process automation (RPA).'}
              </p>
              <p style={{fontSize:'1rem', lineHeight:'1.75', color:'#6C757D'}}>
                {lang === 'de'
                  ? 'In diesem Kurs bringt sie ihre Expertise in Geschäftsprozessen und digitalen Systemen in den Kontext des E-Commerce – praxisnah, datengetrieben und direkt anwendbar.'
                  : 'In this course she brings her expertise in business processes and digital systems into an e-commerce context – practical, data-driven and directly applicable.'}
              </p>
            </div>
          </div>
        </div>
      </section>

      {/* AI & Python Section */}
      <section className="section bg-alt" id="ki">
        <div className="section-inner">
          <p className="section-eyebrow sr">{t.aiEyebrow}</p>
          <h2 className="section-title sr">{t.aiTitle}</h2>
          <div className="divider-line sr"/>
          <p className="section-lead sr">{t.aiLead}</p>

          <div style={{display:'grid', gridTemplateColumns:'repeat(auto-fill, minmax(280px, 1fr))', gap:'16px', marginTop:'32px'}}>
            {[
              [t.aiCard1Title, t.aiCard1Body],
              [t.aiCard2Title, t.aiCard2Body],
              [t.aiCard3Title, t.aiCard3Body],
            ].map(([title, body], i) => (
              <div key={i} className="ai-card sr" style={{transitionDelay:`${i*80}ms`}}>
                <div className="ai-card-title">{title}</div>
                <div className="ai-card-body">{body}</div>
              </div>
            ))}
          </div>

          {/* Sample prompt block */}
          <div className="sr" style={{marginTop:'32px'}}>
            <p style={{fontSize:'0.72rem',fontWeight:700,textTransform:'uppercase',letterSpacing:'0.1em',color:'#6C757D',marginBottom:'12px'}}>
              {lang === 'de' ? 'Beispiel: Prompt für Lab 03 – RFM-Analyse' : 'Example: Prompt for Lab 03 – RFM Analysis'}
            </p>
            <div className="code-block">
              <span className="code-comment"># Prompt für KI-Assistenten (z.B. ChatGPT / Claude):</span>{"\n\n"}
              <span className="code-str">"Erstelle mir eine RFM-Analyse in Python mit Plotly Dash{"\n"}
für einen E-Commerce-Datensatz (CSV mit Spalten: customer_id,{"\n"}
order_date, revenue). Berechne Recency, Frequency und Monetary,{"\n"}
normalisiere die Scores (1–5) und visualisiere die Cluster{"\n"}
als interaktiven 3D Scatter Plot. Nutze das Farbschema{"\n"}
#E87722 (Orange) und #005B9A (Blau)."</span>
            </div>
          </div>
        </div>
      </section>

      {/* Footer */}
      <footer className="footer">
        <div className="footer-inner">
          <div style={{display:'flex', alignItems:'center', justifyContent:'center', gap:'12px', marginBottom:'16px'}}>
            <svg width="32" height="32" viewBox="0 0 28 28" fill="none">
              <rect width="28" height="28" rx="3" fill="#E87722"/>
              <rect x="6" y="6" width="6" height="6" fill="#fff" opacity="0.9"/>
              <rect x="16" y="6" width="6" height="6" fill="#fff" opacity="0.5"/>
              <rect x="6" y="16" width="6" height="6" fill="#fff" opacity="0.5"/>
              <rect x="16" y="16" width="6" height="6" fill="#fff" opacity="0.9"/>
            </svg>
          </div>
          <p className="footer-title">THWS Business School</p>
          <p className="footer-text">{t.footerText}</p>
          <p style={{marginTop:'8px', fontSize:'0.78rem', color:'rgba(255,255,255,0.35)'}}>{t.footerSub}</p>
          <p style={{marginTop:'24px', fontSize:'0.72rem', color:'rgba(255,255,255,0.25)'}}>
            UrbanCart ist ein fiktives Unternehmen. Alle Daten sind synthetisch und dienen ausschließlich Lehrzwecken. ·{' '}
            <a href="https://github.com/swrobuts/e-comm" target="_blank" rel="noopener noreferrer" className="footer-link">GitHub</a>
          </p>
        </div>
      </footer>
    </>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(<App/>);
</script>
</body>
</html>
