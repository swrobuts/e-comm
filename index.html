<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
    <meta name="description" content="E-Commerce Labs – 9 interaktive Tableau-Labs + Python-Bonus auf dem UrbanCart-Datensatz. THWS Business School, Master MMM."/>
<title>E-Commerce &amp; Digitale Geschäftsmodelle · THWS Business School</title>
<style>
/* ── RESET ── */
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
html{scroll-behavior:smooth;font-size:16px}
body{
  font-family:'Segoe UI','Helvetica Neue',Helvetica,Arial,sans-serif;
  background:#fff;color:#212529;
  -webkit-font-smoothing:antialiased;
  overflow-x:hidden;
  line-height:1.5
}
img{display:block;max-width:100%}
a{color:inherit;text-decoration:none}
button{font-family:inherit;cursor:pointer}

/* ── GRID SYSTEM ── */
/* 8px base, columns: max 1200px centered, 32px gutters */
.container{max-width:1200px;margin:0 auto;padding:0 32px}
@media(max-width:640px){.container{padding:0 16px}}

/* ── AICHER TOP BAR ── */
.topbar{height:3px;background:#E87722;position:fixed;top:0;left:0;right:0;z-index:200}

/* ── NAVBAR ── */
.navbar{
  position:sticky;top:4px;z-index:100;
  background:#fff;
  border-bottom:1px solid #E9ECEF;
  height:64px;
}
.navbar__inner{
  max-width:1200px;margin:0 auto;padding:0 32px;
  height:64px;display:flex;align-items:center;
  justify-content:space-between;gap:24px;
}
.navbar__brand{display:flex;align-items:center;gap:16px;flex-shrink:0}
.navbar__logo{height:28px;width:auto;flex-shrink:0}
.navbar__sep{width:1px;height:24px;background:#E9ECEF;flex-shrink:0}
.navbar__kurs{
  font-size:11px;font-weight:700;
  letter-spacing:.1em;text-transform:uppercase;
  color:#6C757D;white-space:nowrap;
}
.navbar__right{display:flex;align-items:center;gap:8px;flex-shrink:0}
.lang-btn{
  padding:4px 12px;
  border:1.5px solid #E9ECEF;background:#fff;
  font-size:11px;font-weight:700;letter-spacing:.06em;
  color:#6C757D;transition:all .15s;
}
.lang-btn.is-active{background:#E87722;color:#fff;border-color:#E87722}
.lang-btn:hover:not(.is-active){border-color:#005B9A;color:#005B9A}

/* ── HERO ── */
.hero{
  background:#005B9A;
  padding:80px 0 72px;
  position:relative;overflow:hidden;
}
.hero::before{
  content:'';
  position:absolute;top:-80px;right:-80px;
  width:480px;height:480px;border-radius:50%;
  background:rgba(232,119,34,.1);
  pointer-events:none;
}
.hero__inner{
  max-width:1200px;margin:0 auto;padding:0 32px;
  display:grid;grid-template-columns:1fr auto;
  align-items:end;gap:64px;
}
@media(max-width:900px){.hero__inner{grid-template-columns:1fr;gap:40px}}
.hero__label{
  font-size:11px;font-weight:700;letter-spacing:.18em;
  text-transform:uppercase;color:rgba(255,255,255,.5);
  margin-bottom:16px;
}
.hero__title{
  font-size:clamp(40px,6vw,72px);
  font-weight:800;color:#fff;
  line-height:1.05;letter-spacing:-.02em;
  margin-bottom:0;
}
.hero__title em{color:#E87722;font-style:normal;display:block}
.hero__sub{
  font-size:17px;color:rgba(255,255,255,.72);
  line-height:1.7;margin-top:24px;max-width:540px;
}
.hero__badges{display:flex;flex-wrap:wrap;gap:8px;margin-top:32px}
.hero__badge{
  border:1.5px solid rgba(255,255,255,.3);
  color:rgba(255,255,255,.7);
  font-size:11px;font-weight:700;letter-spacing:.08em;
  padding:5px 12px;text-transform:uppercase;
}
.hero__cta-row{display:flex;gap:12px;flex-wrap:wrap;margin-top:40px}
.btn-primary{
  background:#E87722;color:#fff;
  padding:12px 28px;font-size:13px;font-weight:700;
  border:2px solid #E87722;letter-spacing:.04em;
  transition:background .15s,transform .15s;
  display:inline-block;
}
.btn-primary:hover{background:#cf6a1c;border-color:#cf6a1c;transform:translateY(-1px)}
.btn-outline-white{
  background:transparent;color:#fff;
  padding:12px 28px;font-size:13px;font-weight:700;
  border:2px solid rgba(255,255,255,.4);letter-spacing:.04em;
  transition:border-color .15s;
  display:inline-block;
}
.btn-outline-white:hover{border-color:rgba(255,255,255,.8)}

/* ── STATS BAR ── */
.statsbar{
  background:#fff;
  border-bottom:1px solid #E9ECEF;
}
.statsbar__inner{
  max-width:1200px;margin:0 auto;padding:0 32px;
  display:flex;flex-wrap:wrap;
}
.stat{
  flex:1;min-width:150px;
  padding:28px 24px;
  text-align:center;
  position:relative;
}
.stat+.stat::before{
  content:'';position:absolute;
  left:0;top:24px;height:calc(100% - 48px);
  width:1px;background:#E9ECEF;
}
.stat__num{
  font-size:36px;font-weight:900;
  color:#E87722;line-height:1;
  font-variant-numeric:tabular-nums;
}
.stat__lbl{
  font-size:11px;font-weight:700;
  text-transform:uppercase;letter-spacing:.1em;
  color:#005B9A;margin-top:8px;
}

/* ── SECTIONS ── */
.section{padding:80px 0}
.section--alt{background:#F8F9FA}
.section__eyebrow{
  font-size:11px;font-weight:700;
  text-transform:uppercase;letter-spacing:.14em;
  color:#E87722;margin-bottom:8px;
}
.section__title{
  font-size:clamp(24px,3vw,36px);
  font-weight:800;color:#212529;
  line-height:1.2;
}
.section__lead{
  font-size:15px;color:#6C757D;
  line-height:1.75;margin-top:16px;
  max-width:640px;
}
.divider{width:48px;height:3px;background:#E87722;margin:12px 0 32px}

/* ── DEMING QUOTE ── */
.quote{
  border-left:3px solid #E87722;
  padding:32px 40px;
  background:#F8F9FA;
  margin-top:48px;
}
.quote__text{
  font-size:clamp(18px,2.5vw,26px);
  font-weight:700;color:#212529;
  line-height:1.45;font-style:italic;
}
.quote__source{
  margin-top:16px;
  font-size:11px;font-weight:700;
  text-transform:uppercase;letter-spacing:.12em;
  color:#E87722;
}

/* ── WORKFLOW ── */
.workflow{
  display:flex;align-items:stretch;
  margin-top:40px;overflow-x:auto;
  border:2px solid #D1D5DB;
  background:#fff;
  box-shadow:0 2px 16px rgba(0,0,0,.08);
  border-radius:4px;overflow:hidden;
}
.wf-step{
  flex:1;min-width:140px;
  padding:28px 20px;
  text-align:center;
  border-right:1px solid #E5E7EB;
  position:relative;
  background:#fff;
}
.wf-step:last-child{border-right:0}
.wf-step__num{
  font-size:12px;font-weight:800;
  color:#E87722;letter-spacing:.12em;
  text-transform:uppercase;margin-bottom:10px;
  display:block;
}
.wf-step__label{
  font-size:14px;font-weight:700;color:#111827;
  line-height:1.3;
}
.wf-step__arrow{
  position:absolute;right:-1px;top:50%;
  transform:translateY(-50%);
  width:8px;height:8px;
  border-top:2px solid #E87722;
  border-right:2px solid #E87722;
  transform:translateY(-50%) rotate(45deg);
  background:#fff;
  z-index:1;
}
.wf-step:last-child .wf-step__arrow{display:none}

/* ── LAB GRID ── */
.lab-grid{
  display:grid;
  grid-template-columns:repeat(3,1fr);
  gap:24px;
  margin-top:56px;
}
@media(max-width:900px){.lab-grid{grid-template-columns:repeat(2,1fr)}}
@media(max-width:580px){.lab-grid{grid-template-columns:1fr}}

.lab-card{
  background:#fff;
  padding:32px 28px;
  display:flex;flex-direction:column;
  min-height:220px;
  transition:background .15s;
  position:relative;
}
.lab-card:hover{background:#F8F9FA}
.lab-card::before{
  content:'';
  position:absolute;top:0;left:0;right:0;
  height:3px;background:#E9ECEF;
  transition:background .15s;
}
.lab-card:hover::before{background:#E87722}
.lab-card__num{
  font-size:11px;font-weight:700;
  letter-spacing:.12em;text-transform:uppercase;
  color:#9CA3AF;margin-bottom:8px;
}
.lab-card__icon{
  width:32px;height:32px;
  margin-bottom:16px;color:#005B9A;
  flex-shrink:0;
}
.lab-card__title{
  font-size:15px;font-weight:800;
  color:#212529;line-height:1.3;
  margin-bottom:8px;
}
.lab-card__desc{
  font-size:13px;color:#6C757D;
  line-height:1.65;flex:1;
}
.lab-card__footer{
  display:flex;align-items:center;
  justify-content:space-between;
  margin-top:24px;padding-top:16px;
  border-top:1px solid #F1F3F5;
}
.lab-card__diff{
  font-size:10px;font-weight:700;
  letter-spacing:.08em;text-transform:uppercase;
  padding:3px 8px;
}
.diff--e{background:#D1FAE5;color:#065F46}
.diff--m{background:#FEF3C7;color:#92400E}
.diff--f{background:#FEE2E2;color:#991B1B}
.lab-card__cta{
  font-size:12px;font-weight:700;
  color:#E87722;letter-spacing:.04em;
  display:flex;align-items:center;gap:4px;
}

/* ── INSTRUCTOR ── */
.instructor{
  display:grid;
  grid-template-columns:320px 1fr;
  gap:64px;align-items:start;
  margin-top:48px;
}
@media(max-width:800px){.instructor{grid-template-columns:1fr;gap:32px}}

.instructor-card{
  border:1px solid #E9ECEF;
  overflow:hidden;
}
.instructor-card__cover{
  height:64px;background:#005B9A;
  position:relative;
}
.instructor-card__cover::after{
  content:'';position:absolute;inset:0;
  background:repeating-linear-gradient(
    -45deg,
    rgba(255,255,255,0) 0,
    rgba(255,255,255,0) 6px,
    rgba(255,255,255,.04) 6px,
    rgba(255,255,255,.04) 7px
  );
}
.instructor-card__avatar-row{
  padding:0 24px;
  margin-top:-36px;
  position:relative;z-index:1;
}
.instructor-card__avatar{
  width:72px;height:72px;border-radius:50%;
  border:3px solid #fff;
  object-fit:cover;object-position:top;
}
.instructor-card__body{padding:12px 24px 24px}
.instructor-card__name{
  font-size:16px;font-weight:800;color:#212529;
  line-height:1.2;
}
.instructor-card__role{
  font-size:13px;color:#6C757D;
  line-height:1.5;margin-top:4px;
}
.instructor-card__org{
  display:flex;align-items:center;gap:8px;
  margin-top:12px;
  font-size:12px;font-weight:700;color:#005B9A;
}
.instructor-card__tags{
  display:flex;flex-wrap:wrap;gap:6px;
  margin-top:12px;
}
.instructor-card__tag{
  background:rgba(0,91,154,.08);
  color:#005B9A;
  font-size:11px;font-weight:700;
  padding:3px 10px;
  border-radius:20px;
}
.instructor-card__contact{
  display:flex;align-items:center;gap:8px;
  margin-top:16px;
  font-size:12px;color:#6C757D;
  border-top:1px solid #F1F3F5;
  padding-top:16px;
}
.instructor-card__contact a{color:#005B9A;font-weight:600}

.instructor__bio p{
  font-size:15px;color:#6C757D;
  line-height:1.75;margin-bottom:16px;
}
.instructor__bio p:last-child{margin-bottom:0}



@media(max-width:800px){}



.code-block{
  background:#0F172A;
  border-left:3px solid #E87722;
  padding:24px;
  margin-top:32px;
  overflow-x:auto;
}
.code-block code{
  font-family:'Consolas','Monaco','Courier New',monospace;
  font-size:12px;color:#E2E8F0;
  line-height:1.8;
  white-space:pre;
  display:block;
}
.code-block .c{color:#64748B}
.code-block .s{color:#86EFAC}

/* ── FOOTER ── */
.footer{
  background:#212529;
  padding:56px 0;
}
.footer__inner{
  max-width:1200px;margin:0 auto;padding:0 32px;
  display:grid;grid-template-columns:1fr 1fr;
  gap:64px;align-items:start;
}
@media(max-width:700px){.footer__inner{grid-template-columns:1fr;gap:32px}}
.footer__brand{}
.footer__thws{filter:brightness(0) invert(1) opacity(.6);height:20px;width:auto}
.footer__title{
  font-size:13px;font-weight:700;color:rgba(255,255,255,.9);
  margin-top:16px;
}
.footer__sub{
  font-size:12px;color:rgba(255,255,255,.4);
  margin-top:6px;line-height:1.6;
}
.footer__links{display:flex;flex-direction:column;gap:8px;align-items:flex-end}
@media(max-width:700px){.footer__links{align-items:flex-start}}
.footer__link{
  font-size:12px;font-weight:600;
  color:rgba(255,255,255,.45);
  transition:color .15s;
}
.footer__link:hover{color:#E87722}
.footer__disclaimer{
  grid-column:1/-1;
  font-size:11px;color:rgba(255,255,255,.2);
  line-height:1.6;padding-top:32px;
  border-top:1px solid rgba(255,255,255,.08);
}

/* ── SCROLL REVEAL ── */
.sr{opacity:0;transform:translateY(16px);transition:opacity .55s ease,transform .55s ease}
.sr.visible{opacity:1;transform:none}

/* ── RESPONSIVE HELPERS ── */
@media(max-width:640px){
  .hero{padding:56px 0 48px}
  .section{padding:56px 0}
  .hero__inner{grid-template-columns:1fr}
  .stat{min-width:120px;padding:20px 12px}
  .stat__num{font-size:28px}
}
</style>
</head>

<script>
// ── LANGUAGE SWITCH ──
function setLang(lang) {
  document.documentElement.lang = lang;
  document.querySelectorAll('[data-de]').forEach(el => {
    const val = el.getAttribute('data-' + lang);
    if (!val) return;
    if (el.tagName === 'INPUT' || el.tagName === 'TEXTAREA') {
      el.value = val;
    } else {
      el.innerHTML = val;
    }
  });
  document.querySelectorAll('.lang-btn').forEach(btn => {
    btn.classList.toggle('is-active', btn.textContent.toLowerCase() === lang);
  });
  localStorage.setItem('lang', lang);
}

// ── SCROLL REVEAL ──
(function() {
  const els = document.querySelectorAll('.sr');
  const obs = new IntersectionObserver(entries => {
    entries.forEach(e => { if (e.isIntersecting) { e.target.classList.add('visible'); } });
  }, { threshold: 0.08 });
  els.forEach(el => obs.observe(el));
})();

// ── INIT ──
(function() {
  const lang = localStorage.getItem('lang') || 'de';
  setLang(lang);
})();
</script>
