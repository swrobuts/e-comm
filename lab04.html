function Quiz({ questions, t, lang }) {
  const [answers, setAnswers] = useState({});
  const [revealed, setRevealed] = useState({});
  const done = Object.keys(revealed).length === questions.length;
  const score = Object.entries(answers).filter(([i, a]) => a === questions[i].correct).length;

  const handleAnswer = (qi, oi) => {
    if (revealed[qi] !== undefined) return;
    setAnswers(prev => ({ ...prev, [qi]: oi }));
    setRevealed(prev => ({ ...prev, [qi]: true }));
  };

  return (
    <div className="quiz-section">
      <h3 className="quiz-title">{t.quizTitle}</h3>
      <p className="quiz-sub">{t.quizSub}</p>
      <div className="quiz-progress">{Object.keys(revealed).length} / {questions.length} {lang==='de'?'beantwortet':'answered'}</div>
      {questions.map((q, qi) => (
        <div key={qi} className="question-block">
          <div className="question-num">{lang==='de'?'Frage':'Question'} {qi + 1}</div>
          <div className="question-text">{q.q}</div>
          <div className="options">
            {q.options.map((opt, oi) => {
              let cls = "option-btn";
              if (revealed[qi] !== undefined) {
                cls += " revealed";
                if (oi === q.correct) cls += " correct";
                else if (oi === answers[qi]) cls += " wrong";
              }
              return (
                <button key={oi} className={cls} onClick={() => handleAnswer(qi, oi)}>
                  <span style={{marginRight:'8px', fontWeight:800}}>{String.fromCharCode(65+oi)}.</span>
                  {opt}
                </button>
              );
            })}
          </div>
          {revealed[qi] !== undefined && (
            <div className={`feedback ${answers[qi] === q.correct ? 'correct' : 'wrong'}`}>
              {answers[qi] === q.correct
                ? (lang==='de'?"✓ Richtig! ":"✓ Correct! ")
                : (lang==='de'?"✗ Nicht ganz. ":"✗ Not quite. ")}
              {q.explain}
            </div>
          )}
        </div>
      ))}
      {done && (
        <div className="quiz-result">
          <div className="quiz-result-score">{score}/{questions.length}</div>
          <div className="quiz-result-label">{lang==='de'?'Punkte':'Points'}</div>
          <div className="quiz-result-msg">
            {score >= 13
              ? (lang==='de'?"🎉 Ausgezeichnet! Weiter zu Lab 05.":"🎉 Excellent! Move on to Lab 05.")
              : score >= 10
              ? (lang==='de'?"👍 Gut! Lies die Erklärungen nochmal durch.":"👍 Good! Read through the explanations again.")
              : (lang==='de'?"💪 Noch einmal! Schau dir die Erklärungen an.":"💪 Try again! Review the explanations.")}
          </div>
        </div>
      )}
    </div>
  );
}

          <div className="divider"/>

          <div className="abc-grid">
            {t.abcCards.map((card, i) => (
              <div key={i} className={`abc-card ${card.cls}`}>

ReactDOM.createRoot(document.getElementById('root')).render(<App/>);
</script>
</body>
