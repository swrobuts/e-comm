function Quiz({ questions, t, lang }) {
  const [answers, setAnswers] = useState({});
  const [revealed, setRevealed] = useState({});
  const done = Object.keys(revealed).length === questions.length;
  const score = Object.entries(answers).filter(([i, a]) => a === questions[i].correct).length;

  const handleAnswer = (qi, oi) => {
    if (revealed[qi] !== undefined) return;
    setAnswers(prev => ({ ...prev, [qi]: oi }));
    setRevealed(prev => ({ ...prev, [qi]: true }));
  };

  return (
    <div className="quiz-section">
      <h3 className="quiz-title">{t.quizTitle}</h3>
      <p className="quiz-sub">{t.quizSub}</p>
      <div className="quiz-progress">{Object.keys(revealed).length} / {questions.length} {lang==='de'?'beantwortet':'answered'}</div>
      {questions.map((q, qi) => (
        <div key={qi} className="question-block">
          <div className="question-num">{lang==='de'?'Frage':'Question'} {qi + 1}</div>
          <div className="question-text">{q.q}</div>
          <div className="options">
            {q.options.map((opt, oi) => {
              let cls = "option-btn";
              if (revealed[qi] !== undefined) {
                cls += " revealed";
                if (oi === q.correct) cls += " correct";
                else if (oi === answers[qi]) cls += " wrong";
              }
              return (
                <button key={oi} className={cls} onClick={() => handleAnswer(qi, oi)}>
                  <span style={{marginRight:'8px', fontWeight:800}}>{String.fromCharCode(65+oi)}.</span>
                  {opt}
                </button>
              );
            })}
          </div>
          {revealed[qi] !== undefined && (
            <div className={`feedback ${answers[qi] === q.correct ? 'correct' : 'wrong'}`}>
              {answers[qi] === q.correct
                ? (lang==='de'?"✓ Richtig! ":"✓ Correct! ")
                : (lang==='de'?"✗ Nicht ganz. ":"✗ Not quite. ")}
              {q.explain}
            </div>
          )}
        </div>
      ))}
      {done && (
        <div className="quiz-result">
          <div className="quiz-result-score">{score}/{questions.length}</div>
          <div className="quiz-result-label">{lang==='de'?'Punkte':'Points'}</div>
          <div className="quiz-result-msg">
            {score >= 13
              ? (lang==='de'?"🎉 Ausgezeichnet! Weiter zu Lab 05.":"🎉 Excellent! Move on to Lab 05.")
              : score >= 10
              ? (lang==='de'?"👍 Gut! Lies die Erklärungen nochmal durch.":"👍 Good! Read through the explanations again.")
              : (lang==='de'?"💪 Noch einmal! Schau dir die Erklärungen an.":"💪 Try again! Review the explanations.")}
          </div>
        </div>
      )}
    </div>
  );
}

            <div style={{width:'1px',height:'24px',background:'#E9ECEF'}}/>
            <span className="nav-brand-text">E-Commerce Labs</span>
          </a>
          <span className="nav-lab-badge">{t.labNum}</span>
        </div>
        <div className="lang-wrap">
          <button className={`lang-btn${lang==='de'?' active':''}`} onClick={()=>setLang('de')}>DE</button>
          <button className={`lang-btn${lang==='en'?' active':''}`} onClick={()=>setLang('en')}>EN</button>
        </div>
      </nav>

      <div className="progress-bar">
        {t.progSteps.map((s, i) => (
          <React.Fragment key={i}>
            <div className={`prog-step ${i < 4 ? 'done' : i === 4 ? 'active' : ''}`}>
              <div className={`prog-dot ${i < 4 ? 'done' : i === 4 ? 'active' : ''}`}>
                {i < 4 ? '✓' : i + 1}
              </div>
              {s}
            </div>
            {i < t.progSteps.length - 1 && <div className="prog-arrow">›</div>}
          </React.Fragment>
        ))}
      </div>

      <div className="lab-hero">
        <div className="lab-hero-inner">
          <div className="lab-num">{t.labNum}</div>
          <h1 className="lab-title">{t.labTitle[0]}<span>{t.labTitle[1]}</span></h1>
          <p className="lab-sub">{t.labSub}</p>
          <div className="lab-meta">
            {[["⏱",t.metaDauer],["📊",t.metaLevel],["📁",t.metaData],["🔧",t.metaTool]].map(([icon,val],i) => (
              <div key={i} className="lab-meta-item">{icon} <strong>{val}</strong></div>
            ))}
          </div>
        </div>
      </div>

      <div className="content">
        <div className="section-block sr">
          <div className="block-eyebrow">{t.s1eye}</div>
          <h2 className="block-title">{t.s1title}</h2>
          <div className="divider"/>
          <p className="block-lead">{t.s1lead}</p>
          <div className="abc-grid">
            {t.abcCards.map((card, i) => (
              <div key={i} className={`abc-card ${card.cls}`}>
                <div className="abc-label">{card.label}</div>
                <div className="abc-range">{card.range}</div>
                <div style={{fontWeight:800, fontSize:'0.87rem', color:'#212529', marginBottom:'6px'}}>{card.title_de}</div>
                <div className="abc-desc">{card.desc_de}</div>
              </div>
            ))}
          </div>
        </div>

        <div className="section-block sr">
          <div className="block-eyebrow">{t.s2eye}</div>
          <h2 className="block-title">{t.s2title}</h2>
          <div className="divider"/>
          <p className="block-lead">{t.s2lead}</p>
          <div className="steps">
            {t.steps.map((step, i) => (
              <div key={i} className="step-card">
                <div className="step-header">
                  <div className="step-num">{i+1}</div>
                  <div className="step-title">{step.title}</div>
                </div>
                <div className="step-body" dangerouslySetInnerHTML={{__html: step.body}}/>
                {step.tip && <div className="step-tip">{step.tip}</div>}
              </div>
            ))}
          </div>
        </div>

        <div className="section-block sr">
          <div className="block-eyebrow">{t.s3eye}</div>
          <h2 className="block-title">{t.s3title}</h2>
          <div className="divider"/>
          <p className="block-lead">{t.s3lead}</p>
          <div className="kpi-grid">
            {t.kpis.map((k,i) => (
              <div key={i} className="kpi-card">
                <div className="kpi-icon">{k.icon}</div>
                <div className="kpi-val">{k.val}</div>
                <div className="kpi-lbl">{k.lbl}</div>
                <div className="kpi-def">{k.def}</div>
              </div>
            ))}
          </div>
        </div>

        <div className="section-block sr">
          <div className="block-eyebrow">{t.s4eye}</div>
          <h2 className="block-title">{t.s4title}</h2>
          <div className="divider"/>
          <div className="steps">
            {t.viz_steps.map((step, i) => (
              <div key={i} className="step-card">
                <div className="step-header">
                  <div className="step-num">{i+1}</div>
                  <div className="step-title">{step.title}</div>
                </div>
                <div className="step-body" dangerouslySetInnerHTML={{__html: step.body}}/>
                {step.tip && <div className="step-tip">{step.tip}</div>}
                <div className="screenshot-placeholder">
                  <div className="screenshot-placeholder-icon">📸</div>
                  <div className="screenshot-placeholder-text">
                    {lang==='de'?`Dein Ergebnis für Schritt ${i+1}`:`Your result for step ${i+1}`}
                  </div>
                </div>
              </div>
            ))}
          </div>
        </div>

        <div className="section-block sr">
          <Quiz questions={t.questions} t={t} lang={lang}/>
        </div>

        <div className="section-block sr">
          <div className="ai-section">
            <div className="ai-eyebrow">{t.aiEye}</div>
            <h3 className="ai-title">{t.aiTitle}</h3>
            <p className="ai-text">{t.aiText}</p>
            <div className="code-block">{t.aiPrompt}</div>
            <p style={{fontSize:'0.78rem', color:'rgba(255,255,255,0.4)', marginTop:'12px'}}>
              {lang==='de'
                ? '→ Nächstes Lab: Kanalanalyse – welcher Marketingkanal bringt den besten ROI?'
                : '→ Next lab: Channel analysis – which marketing channel delivers the best ROI?'}
            </p>
          </div>
        </div>
      </div>

      <div className="lab-nav">
        <a href="lab03.html" className="lab-nav-btn">
          {t.prevLab}
        </a>
        <a href="lab05.html" className="lab-nav-btn primary">
          {t.nextLab}
        </a>
      </div>
    </>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(<App/>);
</script>
</body>
</html>
